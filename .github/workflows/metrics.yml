name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: Tamsir123

          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca
          config_theme: dark
          config_display: large

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_threshold: 0%

          # Contributions calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_facts: yes
          plugin_habits_trim: yes

          # Icons / mastered topics
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 24

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact

          # Lines of code
          plugin_lines: yes
          plugin_lines_sections: base

          # Projects
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes

          # Repositories
          plugin_repositories: yes
          plugin_repositories_featured: Tamsir123/API-RESTfull-Spring-Java, Tamsir123/Dice-Challenge, Tamsir123/Jeu-pendule, Tamsir123/To-Do-List
