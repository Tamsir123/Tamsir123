name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # =========================
      # 1. Profile overview
      # =========================
      - name: Profile overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-profile.svg
          user: Tamsir123

          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca
          config_theme: dark
          config_display: large
          plugins_errors_fatal: no

      # =========================
      # 2. Languages
      # =========================
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages.svg
          user: Tamsir123

          template: classic
          base: ""
          config_timezone: Africa/Casablanca
          config_theme: dark
          plugins_errors_fatal: no

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes

      # =========================
      # 3. Starred topics - icons
      # =========================
      - name: Starred topics icons
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-topics-icons.svg
          user: Tamsir123

          template: classic
          base: ""
          config_timezone: Africa/Casablanca
          config_theme: dark
          plugins_errors_fatal: no

          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: starred
          plugin_topics_limit: 0

      # =========================
      # 4. Starred topics - labels
      # =========================
      - name: Starred topics labels
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-topics-labels.svg
          user: Tamsir123

          template: classic
          base: ""
          config_timezone: Africa/Casablanca
          config_theme: dark
          plugins_errors_fatal: no

          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_sort: starred
          plugin_topics_limit: 20

      # =========================
      # 5. Achievements
      # =========================
      - name: GitHub achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-achievements.svg
          user: Tamsir123

          template: classic
          base: ""
          config_timezone: Africa/Casablanca
          config_theme: dark
          plugins_errors_fatal: no

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes

