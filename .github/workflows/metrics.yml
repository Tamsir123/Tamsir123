name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: Tamsir123

          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca
          config_theme: dark
          config_display: large

          # Better error visibility
          plugins_errors_fatal: no

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used, recently-used
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_threshold: 0%

          # Contributions calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Topics / icons
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 30

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

          # Lines of code
          plugin_lines: yes
          plugin_lines_sections: base

          # Repositories
          plugin_repositories: yes
          plugin_repositories_featured: Tamsir123/API-RESTfull-Spring-Java, Tamsir123/Dice-Challenge, Tamsir123/Jeu-pendule, Tamsir123/To-Do-List
